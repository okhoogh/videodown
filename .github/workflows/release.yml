name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: videodown
  WAILS_VERSION: v2.12.0
  NODE_OPTIONS: --max-old-space-size=4096
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-latest
            platform: linux/amd64
            archive: videodown-linux-amd64.tar.gz
            build_tags: webkit2_41
          - name: windows-amd64
            os: windows-latest
            platform: windows/amd64
            archive: videodown-windows-amd64.zip
            build_tags: ""
          - name: macos-universal
            os: macos-latest
            platform: darwin/universal
            archive: videodown-macos-universal.zip
            build_tags: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          token: ${{ github.token }}
          cache: true
          cache-dependency-path: go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          check-latest: false
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Add Go bin to PATH
        shell: bash
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Build Wails app
        shell: bash
        env:
          mode: prod
        run: |
          if [ -n "${{ matrix.build_tags }}" ]; then
            wails build --clean --platform "${{ matrix.platform }}" -tags "${{ matrix.build_tags }}" -ldflags "-X main.Version=${{ github.ref_name }}"
          else
            wails build --clean --platform "${{ matrix.platform }}" -ldflags "-X main.Version=${{ github.ref_name }}"
          fi

      - name: Package Linux artifact
        if: runner.os == 'Linux'
        shell: bash
        run: |
          package_dir="dist/package/${{ env.APP_NAME }}"
          mkdir -p "$package_dir"
          cp "build/bin/${{ env.APP_NAME }}" "$package_dir/"
          cp "build/appicon.png" "$package_dir/"
          tar -czf "dist/${{ matrix.archive }}" -C "dist/package" "${{ env.APP_NAME }}"

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $PackageDir = "dist/package/${{ env.APP_NAME }}"
          New-Item -ItemType Directory -Force -Path "$PackageDir" | Out-Null
          Copy-Item "build/bin/${{ env.APP_NAME }}.exe" "$PackageDir/"
          Compress-Archive -Path "$PackageDir" -DestinationPath "dist/${{ matrix.archive }}" -Force

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        shell: bash
        run: |
          package_dir="dist/package/${{ env.APP_NAME }}"
          mkdir -p "$package_dir"
          cp -R "build/bin/${{ env.APP_NAME }}.app" "$package_dir/"
          ditto -c -k --sequesterRsrc --keepParent "$package_dir" "dist/${{ matrix.archive }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - name: Create release and upload assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes ""
          fi
          gh release upload "${{ github.ref_name }}" dist/* --clobber
